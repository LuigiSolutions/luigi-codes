<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Luigi Codes mark, Luigi Solutions.
    Double thin ring + minimal "L", all in brand gold (#c9a86a family from
    luigi-os theme.css). Transparent background so it sits correctly on the
    activity bar and on the brand canvas alike.
  -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcc18d"/>
      <stop offset="0.55" stop-color="#c9a86a"/>
      <stop offset="1" stop-color="#a8874d"/>
    </linearGradient>
  </defs>
  <!-- outer ring, broken at the quadrants like the LS seal -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gold)" stroke-width="2.5"
          stroke-dasharray="64 6.68" stroke-dashoffset="32" stroke-linecap="butt"/>
  <!-- inner hairline ring: the signature 32% gold whisper -->
  <circle cx="50" cy="50" r="39.5" fill="none" stroke="#c9a86a" stroke-opacity="0.32" stroke-width="1.25"/>
  <!-- the L: thin, editorial, butt-capped like the wordmark strokes -->
  <path d="M 39 28 L 39 70 L 66 70" fill="none" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="butt" stroke-linejoin="miter"/>
</svg>
